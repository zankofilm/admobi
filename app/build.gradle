plugins {
    id 'com.android.application'
}

android {
    namespace 'ir.javanrood.ngo.adminmobile'
    compileSdk 35

    defaultConfig {
        applicationId 'ir.javanrood.ngo.adminmobile'
        minSdk 23
        targetSdk 35
        versionCode 59
        versionName '1.0.59-admin-3d-account'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
