name: Build Mobile Admin APK

on:
  workflow_dispatch:

jobs:
  build-admin-apk:
    name: Build Mobile Admin APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Build Admin Debug APK
        shell: bash
        run: |
          set -e
          if [ -f "mobile-admin/settings.gradle" ]; then cd mobile-admin; fi
          gradle --no-daemon assembleDebug --stacktrace
      - name: Collect APK output
        shell: bash
        run: |
          set -e
          mkdir -p "$GITHUB_WORKSPACE/apk-output"
          find "$GITHUB_WORKSPACE" -type f -name "*.apk" -exec cp -v {} "$GITHUB_WORKSPACE/apk-output/" \;
          ls -la "$GITHUB_WORKSPACE/apk-output"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: javanrood-mobile-admin-apk-v59-3d-account
          if-no-files-found: error
          path: apk-output/*.apk
